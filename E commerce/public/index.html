<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fieldstone Market — Handmade Everyday Goods</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header" id="site-nav"></header>

<main>
  <div class="container">
    <div class="page-header">
      <p class="eyebrow">No. 001 — Full Catalog</p>
      <h1>Goods built to be used</h1>
      <p>Cast iron, waxed canvas, hand-thrown stoneware — everyday things made to outlast the trend cycle.</p>
    </div>

    <div class="toolbar">
      <input type="text" class="search-input" id="search-input" placeholder="Search the catalog…" />
      <select class="select-input" id="category-select">
        <option value="">All categories</option>
      </select>
    </div>

    <div id="product-grid" class="product-grid">
      <div class="loading">Loading catalog…</div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container" style="display:flex; justify-content:space-between; width:100%; flex-wrap:wrap; gap:10px;">
    <span>Fieldstone Market — a demo storefront.</span>
    <span class="footer-mono">BUILT WITH EXPRESS + SQLITE</span>
  </div>
</footer>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script src="js/index.js"></script>
</body>
</html>
