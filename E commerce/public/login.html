<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log In — Fieldstone Market</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header" id="site-nav"></header>

<main>
  <div class="auth-wrap">
    <div class="auth-card">
      <span class="stamp">Welcome back</span>
      <h1>Log in</h1>
      <p class="sub">Sign in to view your cart and past orders.</p>

      <form id="login-form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password" />
        </div>
        <div class="form-message" id="login-message"></div>
        <button class="btn btn-primary btn-block" type="submit" id="login-btn">Log in</button>
      </form>

      <p class="auth-switch">New here? <a href="register.html">Create an account</a></p>
    </div>
  </div>
</main>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script src="js/login.js"></script>
</body>
</html>
