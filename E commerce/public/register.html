<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Account — Fieldstone Market</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header" id="site-nav"></header>

<main>
  <div class="auth-wrap">
    <div class="auth-card">
      <span class="stamp">New account</span>
      <h1>Create your account</h1>
      <p class="sub">Takes about ten seconds. No credit card required for this demo store.</p>

      <form id="register-form">
        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" required autocomplete="name" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="6" autocomplete="new-password" />
        </div>
        <div class="form-message" id="register-message"></div>
        <button class="btn btn-primary btn-block" type="submit" id="register-btn">Create account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>
</main>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script src="js/register.js"></script>
</body>
</html>
